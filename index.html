<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #001F3F; /* Darker navy */
            color: #FFFFFF;
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600; /* Bold section headings */
        }
        nav ul {
            list-style: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin: 0 10px;
        }
        section {
            background-color: #002A5C; /* Slate color */
            padding: 20px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#community-impact">Community and Impact</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
    <section id="about">
        <h2>About</h2>
        <p>This section contains information about the academic background and achievements.</p>
    </section>
    <section id="community-impact">
        <h2>Community and Impact</h2>
        <p>This section will showcase community engagement and impact projects.</p>
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <p>Please reach out through the contact form.</p>
    </section>
</body>
</html>
